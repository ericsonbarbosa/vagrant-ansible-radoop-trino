---
# ==============================================================================
# 1. INSTALAÇÃO E ESTRUTURA BÁSICA
# ==============================================================================

- name: "hadoop : Verificar se o Hadoop já está instalado"
  stat:
    path: "{{ install_dir }}/hadoop-{{ hadoop_version }}"
  register: hadoop_installed

- name: "hadoop : Baixar binários do Apache Hadoop"
  get_url:
    url: "{{ hadoop_mirror }}"
    dest: "/tmp/hadoop-{{ hadoop_version }}.tar.gz"
    timeout: 300
    mode: '0644'
  when: not hadoop_installed.stat.exists

- name: "hadoop : Descompactar Hadoop"
  unarchive:
    src: "/tmp/hadoop-{{ hadoop_version }}.tar.gz"
    dest: "{{ install_dir }}"
    remote_src: yes
  when: not hadoop_installed.stat.exists

- name: "hadoop : Criar link simbólico para o Hadoop"
  file:
    src: "{{ install_dir }}/hadoop-{{ hadoop_version }}"
    dest: "{{ install_dir }}/hadoop"
    state: link
  become: yes

# ==============================================================================
# 2. CONFIGURAÇÃO DE AMBIENTE E TEMPLATES (Onde a mágica da RAM acontece)
# ==============================================================================

- name: "hadoop : Configurar hadoop-env.sh (Java e Memória)"
  template:
    src: hadoop-env.sh.j2
    dest: "{{ install_dir }}/hadoop/etc/hadoop/hadoop-env.sh"
    owner: vagrant
    group: vagrant
    mode: '0755'
  become: yes

- name: "hadoop : Configurar templates do Hadoop (XML)"
  template:
    src: "{{ item }}.j2"
    dest: "{{ install_dir }}/hadoop/etc/hadoop/{{ item }}"
    owner: vagrant
    group: vagrant
  loop:
    - core-site.xml
    - hdfs-site.xml

# ==============================================================================
# 3. PERMISSÕES E SSH PASSWORDLESS
# ==============================================================================

- name: "hadoop : Ajustar dono da pasta do Hadoop de forma recursiva"
  file:
    path: "{{ install_dir }}/hadoop-{{ hadoop_version }}"
    owner: vagrant
    group: vagrant
    recurse: yes
  become: yes

- name: "hadoop : Gerar chave SSH para o usuário vagrant"
  command: ssh-keygen -t rsa -P "" -f /home/vagrant/.ssh/id_rsa
  args:
    creates: /home/vagrant/.ssh/id_rsa
  become_user: vagrant

- name: "hadoop : Garantir permissões restritas na pasta .ssh"
  file:
    path: /home/vagrant/.ssh
    state: directory
    mode: '0700'
    owner: vagrant
    group: vagrant
  become: yes

- name: "hadoop : Ler a chave pública gerada na VM"
  shell: cat /home/vagrant/.ssh/id_rsa.pub
  register: public_key_content
  changed_when: false

- name: "hadoop : Autorizar a própria chave de forma segura"
  authorized_key:
    user: vagrant
    state: present
    key: "{{ public_key_content.stdout }}"
  become: yes
  
- name: "hadoop : Ignorar StrictHostKeyChecking (evita prompt no start-dfs.sh)"
  copy:
    dest: /home/vagrant/.ssh/config
    content: |
      Host *
        StrictHostKeyChecking no
        UserKnownHostsFile /dev/null
    owner: vagrant
    group: vagrant
    mode: '0600'
  become_user: vagrant

# ==============================================================================
# 4. DIRETÓRIOS E FORMATAÇÃO DO FILESYSTEM
# ==============================================================================

- name: "hadoop : Criar diretórios de dados e logs"
  file:
    path: "{{ item }}"
    state: directory
    owner: vagrant
    group: vagrant
    mode: '0755'
  loop:
    - /opt/hadoop/logs
    - /opt/hadoop/data/namenode
    - /opt/hadoop/data/datanode

- name: "hadoop : Verificar se o NameNode já foi formatado"
  stat:
    path: "/opt/hadoop/data/namenode/current/VERSION"
  register: namenode_format_status

- name: "hadoop : Formatar NameNode (Executado apenas na primeira vez)"
  shell: |
    export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
    {{ install_dir }}/hadoop/bin/hdfs namenode -format -force -nonInteractive
  become: yes
  become_user: vagrant
  when: not namenode_format_status.stat.exists

# ==============================================================================
# 5. ATIVAÇÃO DO SERVIÇO VIA SYSTEMD (A "Chave Geral")
# ==============================================================================

- name: "hadoop : Criar arquivo de serviço do Systemd"
  template:
    src: hadoop-hdfs.service.j2
    dest: /etc/systemd/system/hadoop-hdfs.service
  become: yes

- name: "hadoop : Iniciar e habilitar o serviço no boot"
  systemd:
    name: hadoop-hdfs
    enabled: yes
    state: started
    daemon_reload: yes
  become: yes