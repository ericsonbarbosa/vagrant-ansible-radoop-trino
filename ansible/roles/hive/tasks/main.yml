---
# ==============================================================================
# 1. PREPARAÇÃO E BINÁRIOS
# ==============================================================================

- name: "hive : Verificar se o binário do Hive existe localmente"
  delegate_to: localhost
  become: no
  stat:
    path: "{{ role_path }}/files/apache-hive-{{ hive_version }}-bin.tar.gz"
  register: hive_file

- name: "hive : Validar existência do arquivo"
  fail:
    msg: "ERRO: Arquivo não encontrado em {{ role_path }}/files/"
  when: not hive_file.stat.exists

- name: "hive : Enviar e descompactar Apache Hive"
  unarchive:
    src: "apache-hive-{{ hive_version }}-bin.tar.gz"
    dest: "{{ install_dir }}"
    owner: vagrant
    group: vagrant
    creates: "{{ install_dir }}/apache-hive-{{ hive_version }}-bin/bin/hive"

- name: "hive : Criar link simbólico"
  file:
    src: "{{ install_dir }}/apache-hive-{{ hive_version }}-bin"
    dest: "{{ install_dir }}/hive"
    state: link

# ==============================================================================
# 2. COMPATIBILIDADE E PERMISSÕES
# ==============================================================================

- name: "hive : Corrigir incompatibilidade da biblioteca Guava"
  shell: |
    rm -f {{ install_dir }}/hive/lib/guava-19.0.jar
    cp {{ install_dir }}/hadoop/share/hadoop/common/lib/guava-*.jar {{ install_dir }}/hive/lib/
  args:
    creates: "{{ install_dir }}/hive/lib/guava-27.0-jre.jar"

- name: "hive : Ajustar dono da pasta recursivamente"
  file:
    path: "{{ install_dir }}/apache-hive-{{ hive_version }}-bin"
    owner: vagrant
    group: vagrant
    recurse: yes
  become: yes

# ==============================================================================
# 3. INTEGRAÇÃO COM HDFS
# ==============================================================================

- name: "hive : Verificar se diretórios HDFS existem"
  shell: "{{ install_dir }}/hadoop/bin/hdfs dfs -test -d /user/hive/warehouse"
  register: hdfs_dir_exists
  ignore_errors: yes
  changed_when: false
  become_user: vagrant

- name: "hive : Criar estrutura de diretórios no HDFS"
  shell: |
    {{ install_dir }}/hadoop/bin/hdfs dfs -mkdir -p /tmp
    {{ install_dir }}/hadoop/bin/hdfs dfs -mkdir -p /user/hive/warehouse
    {{ install_dir }}/hadoop/bin/hdfs dfs -chmod g+w /tmp
    {{ install_dir }}/hadoop/bin/hdfs dfs -chmod g+w /user/hive/warehouse
  become_user: vagrant
  when: hdfs_dir_exists.rc != 0

# ==============================================================================
# 4. CONFIGURAÇÃO E SCHEMA
# ==============================================================================

- name: "hive : Configurar hive-site.xml"
  template:
    src: hive-site.xml.j2
    dest: "{{ install_dir }}/hive/conf/hive-site.xml"
    owner: vagrant
    group: vagrant

- name: "hive : Configurar Memória e JAVA_HOME no hive-env.sh"
  lineinfile:
    path: "{{ install_dir }}/hive/conf/hive-env.sh"
    line: "{{ item }}"
    create: yes
    owner: vagrant
    group: vagrant
  with_items:
    - "export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64"
    - "export HADOOP_HEAPSIZE=1024"

# ==============================================================================
# PERMISSÕES E INICIALIZAÇÃO DO METASTORE
# ==============================================================================

- name: "hive : Ajustar dono da pasta do Hive de forma recursiva"
  file:
    path: "{{ install_dir }}/apache-hive-3.1.3-bin" # ou a variável que você usa para a pasta descompactada
    owner: vagrant
    group: vagrant
    recurse: yes
  become: yes

- name: "hive : Garantir permissões na pasta raiz do Hive"
  file:
    path: "{{ install_dir }}/hive"
    owner: vagrant
    group: vagrant
    state: directory
  become: yes

- name: "hive : Inicializar o Schema do Metastore"
  shell: |
    /opt/hive/bin/schematool -dbType derby -initSchema
  environment:
    JAVA_HOME: "/usr/lib/jvm/java-11-openjdk-amd64"
    HADOOP_HOME: "/opt/hadoop"
    PATH: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/opt/hadoop/bin"
  args:
    creates: "/opt/hive/metastore_db"  # A mágica da idempotência: só roda se não existir
  become: yes
  become_user: vagrant

# ==============================================================================
# 5. AMBIENTE GLOBAL (Resolve o 'beeline: command not found')
# ==============================================================================

- name: "hive : Adicionar Hive ao PATH global"
  copy:
    dest: /etc/profile.d/hive_path.sh
    content: |
      export HIVE_HOME={{ install_dir }}/hive
      export PATH=$PATH:$HIVE_HOME/bin
    mode: '0644'
  become: yes

# ==============================================================================
# 6. SERVIÇOS SYSTEMD (Metastore e HiveServer2)
# ==============================================================================

- name: "hive : Criar arquivo de serviço para Hive Metastore"
  template:
    src: hive-metastore.service.j2
    dest: /etc/systemd/system/hive-metastore.service
  become: yes

- name: "hive : Iniciar e habilitar Hive Metastore"
  systemd:
    name: hive-metastore
    enabled: yes
    state: started
    daemon_reload: yes
  become: yes

- name: "hive : Aguardar Metastore abrir a porta 9083"
  wait_for:
    port: 9083
    delay: 5
    timeout: 120 # Dá um tempo pro Java acordar e criar o Derby

- name: "hive : Criar arquivo de serviço para HiveServer2"
  template:
    src: hive-server2.service.j2
    dest: /etc/systemd/system/hive-server2.service
  become: yes

- name: "hive : Iniciar e habilitar HiveServer2"
  systemd:
    name: hive-server2
    enabled: yes
    state: started
    daemon_reload: yes
  become: yes