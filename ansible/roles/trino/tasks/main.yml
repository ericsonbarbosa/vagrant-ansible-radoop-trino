---
# ==============================================================================
# 1. INSTALAÇÃO DO SERVIDOR E CLI
# ==============================================================================
- name: "trino : Instalar Java 21"
  apt:
    name: openjdk-21-jdk
    state: present
    update_cache: yes
    cache_valid_time: 3600
  become: yes

- name: "trino : Verificar se o binário do Trino existe localmente"
  delegate_to: localhost
  become: no
  stat:
    path: "{{ role_path }}/files/trino-server-{{ trino_version }}.tar.gz"
  register: trino_file

- name: "trino : Validar existência do arquivo"
  fail:
    msg: "O binário do Trino não foi encontrado em {{ role_path }}/files/. Baixe o .tar.gz e coloque lá."
  when: not trino_file.stat.exists

- name: "trino : Enviar e Descompactar Servidor"
  unarchive:
    src: "trino-server-{{ trino_version }}.tar.gz"
    dest: "{{ install_dir }}"
    remote_src: no
    creates: "{{ install_dir }}/trino-server-{{ trino_version }}"

- name: "trino : Criar link simbólico"
  file:
    src: "{{ install_dir }}/trino-server-{{ trino_version }}"
    dest: "{{ install_dir }}/trino"
    state: link

- name: "trino : Instalar TRINO CLI (Comando Global)"
  get_url:
    url: "https://repo1.maven.org/maven2/io/trino/trino-cli/{{ trino_version }}/trino-cli-{{ trino_version }}-executable.jar"
    dest: "/usr/local/bin/trino"
    mode: '0755'
  become: yes

# ==============================================================================
# 2. CONFIGURAÇÕES E CONECTORES
# ==============================================================================
- name: "trino : Criar estrutura de diretórios"
  file:
    path: "{{ item }}"
    state: directory
    owner: vagrant
    group: vagrant
    mode: '0755'
  loop:
    - "{{ install_dir }}/trino/etc/catalog"
    - "{{ install_dir }}/trino/var"
    - "/opt/hadoop/etc/hadoop"

- name: "trino : Configurar arquivos do Trino (node, jvm, config)"
  template:
    src: "{{ item }}.j2"
    dest: "{{ install_dir }}/trino/etc/{{ item }}"
  loop:
    - node.properties
    - jvm.config
    - config.properties

- name: "trino : Configurar conector Hive e arquivos do Hadoop"
  template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
  loop:
    - { src: 'catalog/hive.properties.j2', dest: '{{ install_dir }}/trino/etc/catalog/hive.properties' }
    - { src: 'hadoop/core-site.xml.j2', dest: '/opt/hadoop/etc/hadoop/core-site.xml' }
    - { src: 'hadoop/hdfs-site.xml.j2', dest: '/opt/hadoop/etc/hadoop/hdfs-site.xml' }

# ==============================================================================
# 3. GERENCIAMENTO PELO SYSTEMD
# ==============================================================================
- name: "trino : Configurar Serviço Systemd"
  template:
    src: trino.service.j2
    dest: /etc/systemd/system/trino.service
  become: yes

- name: "trino : Habilitar e Iniciar Trino"
  systemd:
    name: trino
    enabled: yes
    state: started
    daemon_reload: yes
  become: yes